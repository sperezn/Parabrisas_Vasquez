<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Parabrisas Vasquez</title>
    <link rel="stylesheet" href="/public/css/login.css">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <a href="/views/index.html" class="home-icon">
        <i class="fas fa-home"></i>
    </a>
    

    <div class="login-container">
        
        <!-- Sección Izquierda: Formulario de Login -->
        <div class="login-form-section">
            
            <h2>Bienvenido a Parabrisas Vasquez</h2>
            <p class="login-subtitle">Por favor, ingresa tus credenciales para acceder</p>
            <form id="loginForm" action="/login" method="POST">
                <div class="form-group">
                    <label for="username">Usuario o Correo Electrónico</label>
                    <div class="input-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" name="username" class="form-control" placeholder="Ingresa tu usuario o correo" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" class="form-control" placeholder="Ingresa tu contraseña" required autocomplete="current-password">
                    </div>
                </div>
                <button type="submit" class="btn-login">Iniciar Sesión</button>
                <!-- Mensaje de error dinámico -->
                <p id="errorMessage" style="display: none; color: red;"></p>
            </form>
            <p class="register-link">
                ¿No tienes cuenta? 
                <a href="/views/registro.html">Regístrate aquí</a>
            </p>
        </div>

        <!-- Sección Derecha: Imagen de Fondo -->
        <div class="login-image-section">
            <img src="/public/imagenes/bryan auto completo trasero.jpeg" alt="Imagen Login">
        </div>
    </div>

    <!-- Script para el manejo del formulario de login -->
    <script src="/public/js/login.js"></script>
</body>
</html>
