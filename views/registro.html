<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Parabrisas Vasquez</title>
    <link rel="stylesheet" href="/public/css/registro.css">
    <script src="/public/js/registro.js"></script>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<header class="main-header">
    <nav class="nav-left">
        <ul>
            <li><a href="/views/Index.html">Inicio</a></li>
            <li><a href="/views/servicios.html">Servicios</a></li>
            <li><a href="/views/contacto.html">Contacto</a></li> 
        </ul>
    </nav>
    
    <div class="logo">
        <h1>Registro de usuario </h1>
    </div>
    
    <nav class="nav-right">
        <ul>
            <li><a href="#" class="agendar-cita">Agendar Cita</a></li>
            <li>
                <a href="/views/login.html" class="account-link">
                    <i class="fas fa-user"></i>
                </a>
            </li>
        </ul>
    </nav>
</header>



<!-- Contenedor para la alerta personalizada -->
<div class="custom-alert-container">
    <div id="custom-alert" class="custom-alert" style="display: none;">
        <span id="alert-message"></span>
        <button type="button" class="close-alert" onclick="closeAlert()">×</button>
    </div>
</div>

<div class="main-content">
    <div class="background-image"></div>
    <div class="container">
        

        <div class="form-container">
            <form id="registerForm" method="POST" class="form-register">
                <!-- Campos del formulario -->
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label for="nombre">Nombre</label>
                        <input type="text" class="form-control" id="nombre" name="nombre" required>
                    </div>
                    <div class="form-group col-md-6">
                        <label for="apellido">Apellido</label>
                        <input type="text" class="form-control" id="apellido" name="apellido" required>
                    </div>
                    <div class="form-group col-md-6">
                        <label for="usuario">Usuario</label>
                        <input type="text" class="form-control" id="usuario" name="usuario" required>
                    </div>
                    <div class="form-group col-md-6">
                        <label for="role">Tipo de Usuario</label>
                        <select class="form-control" id="role" name="role">
                            <option value="cliente">Cliente</option>
                            <option value="admin">Administrador</option>
                        </select>
                    </div>
                    <div class="form-group col-md-6">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="form-group col-md-6">
                        <label for="celular">Número de Celular</label>
                        <input type="text" class="form-control" id="celular" name="celular" required>
                    </div>
                    <div class="form-group col-md-6">
                        <label for="password">Contraseña</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="form-group col-md-6">
                        <label for="password_confirmation">Confirmar Contraseña</label>
                        <input type="password" class="form-control" id="password_confirmation" name="password_confirmation" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Registrarse</button>
            </form>
            
        </div>
    </div>
</div>

<footer class="main-footer">
    <!-- Footer con detalles de contacto -->
</footer>



<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

</body>
</html>
